name: subrepo-push-release
#
# Lives on `main`. Fires when a library author pushes to main and touches
# release/. Syncs ./release out to the `release` branch. The subrepo sync itself
# (pull-then-push, then propagate the .gitrepo pointer bump back to main) lives
# in the hosted, unit-tested script scripts/actions/push-release.sh.
on:
  push:
    branches: [main]
    paths:
      - "release/**"

env:
  # Base URL for the hosted suede scripts this workflow curls as $SUEDE_SCRIPTS/<path>.
  # Point it at your canonical host/ref; every referenced script must be reachable there.
  # (git-subrepo is installed separately on purpose — it's a third-party tool, not a suede script.)
  SUEDE_SCRIPTS: https://raw.githubusercontent.com/pmalacho-mit/suede/refs/heads/main/scripts

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git user
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Configure Git credentials
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Populate dependency artifacts
        shell: bash
        run: |
          bash -c "$(curl -fsSL "$SUEDE_SCRIPTS/populate/dependencies.sh")"

      - name: Commit dependency changes
        run: |
          if [ -n "$(git status --porcelain release/.suede/.dependencies/)" ]; then
            git add release/.suede/.dependencies/
            git commit -m "chore(suede): update dependency artifacts"
          else
            echo "No dependency changes to commit"
          fi

      - name: Install git-subrepo
        run: |
          git clone https://github.com/ingydotnet/git-subrepo ~/.git-subrepo
          echo "$HOME/.git-subrepo/lib" >> "$GITHUB_PATH"   # on PATH for all later steps, incl. the script's child shell

      - name: Check git-subrepo installation
        run: git subrepo --version

      - name: Sync ./release out to the release branch
        run: bash -c "$(curl -fsSL "$SUEDE_SCRIPTS/actions/push-release.sh")"
